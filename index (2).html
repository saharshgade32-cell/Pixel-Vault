}

// ─── MAZE RUNNER ─────────────────────────────────────────────────────────────
function gPathfind(){
  var SIZE=13,SZ=26;
  function genMaze(){
    var grid=[];
    for(var r=0;r<SIZE;r++){grid.push([]);for(var c=0;c<SIZE;c++)grid[r].push(1);}
    function carve(r,c){grid[r][c]=0;var dirs=[[0,2],[2,0],[0,-2],[-2,0]].sort(function(){return Math.random()-.5;});dirs.forEach(function(d){var nr=r+d[0],nc=c+d[1];if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&grid[nr][nc]===1){grid[r+d[0]/2][c+d[1]/2]=0;carve(nr,nc);}});}
    carve(1,1);grid[SIZE-2][SIZE-1]=0;return grid;
  }
  var maze=genMaze(),pr=1,pc=1,steps=0,time=0,over=false;
  var iv=setInterval(function(){if(!over){time++;var t=qs('#mztm');if(t)t.textContent='⏱ '+time+'s';}},1000);
  var cv,ctx;
  function draw(){
    if(!cv)return;
    ctx.fillStyle='#020a10';ctx.fillRect(0,0,SIZE*SZ,SIZE*SZ);
    for(var r=0;r<SIZE;r++)for(var c=0;c<SIZE;c++){
      if(maze[r][c]===1){ctx.fillStyle='rgba(0,245,255,.15)';ctx.fillRect(c*SZ,r*SZ,SZ,SZ);ctx.strokeStyle='rgba(0,245,255,.1)';ctx.strokeRect(c*SZ,r*SZ,SZ,SZ);}
    }
    ctx.fillStyle='rgba(170,255,0,.4)';ctx.fillRect((SIZE-1)*SZ+SZ*0,( SIZE-2)*SZ,SZ,SZ);
    ctx.fillStyle='#00f5ff';ctx.shadowColor='#00f5ff';ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(pc*SZ+SZ/2,pr*SZ+SZ/2,SZ/2-3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  }
  function move(dr,dc){
    if(over)return;
    var nr=pr+dr,nc=pc+dc;
    if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&maze[nr][nc]===0){pr=nr;pc=nc;steps++;}
    if(pr===SIZE-2&&pc===SIZE-1){over=true;clearInterval(iv);var m=qs('#mzmsg');if(m)m.textContent='🏆 ESCAPED in '+steps+' steps & '+time+'s!';}
    draw();
  }
  function render(){
    setHTML('<div class="g-score" id="mzsc">Steps: '+steps+'</div>'+
      '<div style="text-align:right;font-size:.85rem;color:rgba(200,232,255,.4);margin-bottom:6px" id="mztm">⏱ 0s</div>'+
      '<canvas id="mzvc" width="'+(SIZE*SZ)+'" height="'+(SIZE*SZ)+'" style="display:block;margin:0 auto;border:1px solid rgba(0,245,255,.2);border-radius:2px;max-width:100%"></canvas>'+
      '<div class="g-msg" id="mzmsg">Reach the green exit!</div>'+
      '<div class="dpad">'+
        '<div class="dpad-btn dpad-up" id="mzup">&#9650;</div>'+
        '<div class="dpad-btn dpad-dn" id="mzdn">&#9660;</div>'+
        '<div class="dpad-btn dpad-lt" id="mzlt">&#9664;</div>'+
        '<div class="dpad-btn dpad-rt" id="mzrt">&#9654;</div>'+
      '</div>'+
      '<div class="g-center" style="margin-top:6px"><button class="g-btn" id="mznew">NEW MAZE</button></div>');
    cv=document.getElementById('mzvc');if(cv)ctx=cv.getContext('2d');draw();
    var mzup=document.getElementById('mzup'),mzdn=document.getElementById('mzdn'),mzlt=document.getElementById('mzlt'),mzrt=document.getElementById('mzrt');
    function bindMove(el,dr,dc){if(!el)return;el.addEventListener('click',function(){move(dr,dc);});el.addEventListener('touchstart',function(e){e.preventDefault();move(dr,dc);},{passive:false});}
    bindMove(mzup,-1,0);bindMove(mzdn,1,0);bindMove(mzlt,0,-1);bindMove(mzrt,0,1);
    function onK(e){var m={ArrowUp:[-1,0],ArrowDown:[1,0],ArrowLeft:[0,-1],ArrowRight:[0,1],w:[-1,0],s:[1,0],a:[0,-1],d:[0,1]};var d=m[e.key];if(d){e.preventDefault();move(d[0],d[1]);}}
    document.addEventListener('keydown',onK);
    qs('#mznew').addEventListener('click',function(){clearInterval(iv);document.removeEventListener('keydown',onK);gPathfind();});
    cleanupFn=function(){clearInterval(iv);document.removeEventListener('keydown',onK);};
  }
  render();
}

// ─── ANAGRAM RUSH ────────────────────────────────────────────────────────────
function gAnagram(){
  var wordSets=[
    {letters:'GAMING',words:['GAMING','MAGI','GAIN','MAIN','MINI','MINA','NAIM','GAMIN','ANIME']},
    {letters:'PLANET',words:['PLANET','PLANE','PANEL','PLATEN','LEANT','PLANT','PENALT','PLAN','LANE','LEAN','TALE','TAPE','LATE','PANT','NAPE','PEAL','PALE','PATE']},
    {letters:'STREAM',words:['STREAM','MASTER','MATERS','TAMERS','RAMS','STAR','TRAM','MARE','RATE','TEAM','MATE','SEAM','STEAM','SMEAR','TERMS','MAST','TAME','REAM']},
    {letters:'BRIGHT',words:['BRIGHT','BIRTH','GIRTH','GRITH','BIGHT','RIGHT','BRIT']},
    {letters:'FLOWER',words:['FLOWER','FOWLER','FOWL','WOLF','LOWER','LORE','ROLE','WORE','FORE','FROW','FLOE','FOWL','FLEW']},
  ];
  var ws=wordSets[Math.floor(Math.random()*wordSets.length)];
  var found=[],time=60,iv,score=0;
  function render(msg){
    msg=msg||'';
    setHTML('<div class="g-score">Found: '+found.length+' | Score: '+score+' | ⏱ <span id="agrt">'+time+'s</span></div>'+
      '<div style="text-align:center;margin:12px 0">'+
        '<div style="font-size:.8rem;color:rgba(200,232,255,.4);letter-spacing:.15em;margin-bottom:8px">MAKE WORDS FROM THESE LETTERS:</div>'+
        '<div style="font-family:\'Orbitron\',monospace;font-size:1.8rem;color:var(--neon2);letter-spacing:.35em;text-shadow:0 0 20px rgba(255,0,170,.4)">'+ws.letters+'</div>'+
      '</div>'+
      '<div class="g-msg">'+msg+'</div>'+
      '<input class="g-input" id="agrin" type="text" placeholder="Type a word (min 3 letters)..." autocomplete="off" autocorrect="off" spellcheck="false">'+
      '<div class="g-row"><button class="g-btn" id="agrcheck">SUBMIT</button></div>'+
      '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;min-height:30px">'+found.map(function(w){return'<span style="background:rgba(170,255,0,.12);border:1px solid var(--neon3);border-radius:3px;padding:3px 8px;font-size:.78rem;color:var(--neon3);font-family:\'Orbitron\',monospace">'+w+'</span>';}).join('')+'</div>');
    qs('#agrin').focus();
    clearInterval(iv);
    iv=setInterval(function(){time--;var t=qs('#agrt');if(t)t.textContent=time+'s';if(time<=0){clearInterval(iv);setHTML('<div class="g-score">Time\'s up! Score: '+score+'</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin:10px 0">'+found.map(function(w){return'<span style="background:rgba(170,255,0,.12);border:1px solid var(--neon3);border-radius:3px;padding:3px 8px;font-size:.78rem;color:var(--neon3)">'+w+'</span>';}).join('')+'</div><div class="g-center"><button class="g-btn" id="agrnew">PLAY AGAIN</button></div>');qs('#agrnew').addEventListener('click',gAnagram);}},1000);
    function check(){
      var v=qs('#agrin').value.toUpperCase().trim();qs('#agrin').value='';
      if(v.length<3){render('Need at least 3 letters!');return;}
      if(found.indexOf(v)>=0){render('Already found: '+v);return;}
      var letters=ws.letters.split(''),valid=true;var tmp=letters.slice();
      for(var i=0;i<v.length;i++){var idx=tmp.indexOf(v[i]);if(idx<0){valid=false;break;}tmp.splice(idx,1);}
      if(!valid){render('❌ Can\'t make "'+v+'" from these letters!');return;}
      if(ws.words.map(function(w){return w.toUpperCase();}).indexOf(v)<0){render('❌ Not in word list!');return;}
      found.push(v);score+=v.length;render('✅ +'+v.length+' pts!');
    }
    qs('#agrin').addEventListener('keydown',function(e){if(e.key==='Enter')check();});
    qs('#agrcheck').addEventListener('click',check);
    cleanupFn=function(){clearInterval(iv);};
  }
  render();
}

// ─── NEON SLOTS ──────────────────────────────────────────────────────────────
function gSlots(){
  var symbols=['🍒','🍋','🍊','🍇','⭐','💎','🔔','7️⃣'];
  var coins=100,spin=false;
  var reels=[0,0,0];
  var PAYS={
    '💎💎💎':500,'7️⃣7️⃣7️⃣':300,'⭐⭐⭐':150,'🔔🔔🔔':100,
    '🍇🍇🍇':80,'🍊🍊🍊':60,'🍋🍋🍋':40,'🍒🍒🍒':30,
    '🍒🍒':10,'⭐':5
  };
  function getWin(r){
    var s=r.map(function(i){return symbols[i];});
    var key=s.join('');
    if(PAYS[key])return{msg:'JACKPOT! '+key,win:PAYS[key]};
    if(s[0]===s[1]&&s[1]===s[2])return{msg:'WIN! '+key,win:30};
    if(s[0]===s[1])return{msg:'PAIR! '+s[0]+s[1],win:8};
    if(s.indexOf('🍒')>=0)return{msg:'Cherry! 🍒',win:2};
    return{msg:'No win 😔',win:0};
  }
  function render(msg,lastWin){
    msg=msg||''; lastWin=lastWin||0;
    setHTML('<div class="g-score">💰 Coins: '+coins+'</div>'+
      '<div style="display:flex;justify-content:center;gap:8px;margin:16px 0">'+
        reels.map(function(r){return'<div style="width:72px;height:72px;background:rgba(20,5,30,.8);border:2px solid rgba(255,0,170,.3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:2.2rem;box-shadow:0 0 16px rgba(255,0,170,.1)">'+symbols[r]+'</div>';}).join('')+
      '</div>'+
      '<div style="text-align:center;margin:8px 0">'+
        '<table style="margin:0 auto;font-size:.75rem;color:rgba(200,232,255,.4)">'+
          '<tr><td>3x💎</td><td style="padding:0 8px">500</td><td>3x⭐</td><td>150</td></tr>'+
          '<tr><td>3x7️⃣</td><td>300</td><td>3x🔔</td><td>100</td></tr>'+
          '<tr><td>3x same</td><td>30</td><td>Pair</td><td>8</td></tr>'+
        '</table>'+
      '</div>'+
      (msg?'<div class="g-msg" style="color:'+(lastWin>0?'var(--neon3)':'rgba(200,232,255,.5)')+'">'+msg+(lastWin>0?' (+'+lastWin+')':'')+'</div>':'<div class="g-msg">Pull the lever and spin!</div>')+
      '<div class="g-row" style="margin-top:10px">'+
        '<button class="g-btn" style="font-size:1rem;padding:12px 28px" id="slspin"'+(coins<=0?' disabled':'')+'>🎰 SPIN (10 coins)</button>'+
      '</div>'+
      '<div class="g-center" style="margin-top:8px"><button class="g-btn" id="slreset">RESET COINS</button></div>');
    qs('#slreset').addEventListener('click',function(){coins=100;render();});
    if(coins<=0){var m=qs('.g-msg');if(m)m.textContent='💸 Out of coins! Reset to play again.';}
    qs('#slspin').addEventListener('click',function(){
      if(spin||coins<10)return;
      coins-=10;spin=true;
      var frames=0,total=25+Math.floor(Math.random()*15);
      var iv=setInterval(function(){
        reels=[Math.floor(Math.random()*symbols.length),Math.floor(Math.random()*symbols.length),Math.floor(Math.random()*symbols.length)];
        render('Spinning...');
        qs('#slspin').disabled=true;
        frames++;
        if(frames>=total){
          clearInterval(iv);spin=false;
          var result=getWin(reels);coins+=result.win;
          render(result.msg,result.win);
        }
      },80);
    });
  }
  render();
  cleanupFn=function(){/* slots: spin cleans itself via clearInterval */};
}

// ─── TOWER DEFENSE ───────────────────────────────────────────────────────────
function gFortress(){
  var gold=80,lives=20,wave=0,over=false,placing=null;
  var PATH=[[0,0],[1,0],[2,0],[3,0],[4,0],[4,1],[4,2],[4,3],[4,4],[3,4],[2,4],[1,4],[0,4],[0,5],[0,6],[1,6],[2,6],[3,6],[4,6],[4,7],[4,8]];
  var COLS=5,ROWS=9;
  var pathSet=new Set(PATH.map(function(p){return p[0]+','+p[1];}));
  var towers=[],enemies=[],projectiles=[];
  var TOWER_TYPES=[
    {name:'Gun',emoji:'🔫',cost:20,range:1.5,dmg:5,rate:40,color:'#00f5ff'},
    {name:'Laser',emoji:'⚡',cost:35,range:2.5,dmg:12,rate:70,color:'#ff00aa'},
    {name:'Bomb',emoji:'💣',cost:50,range:1,dmg:30,rate:120,color:'#ffaa00'},
  ];
  var ttype=0;
  function spawnWave(){
    wave++;
    var count=3+wave*2;
    for(var i=0;i<count;i++){
      (function(delay){setTimeout(function(){if(over)return;enemies.push({pi:0,progress:0,hp:(10+wave*5),maxhp:(10+wave*5),spd:0.01+wave*0.002});},delay);})(i*800);
    }
  }
  function render(){
    var cells='';
    for(var r=0;r<ROWS;r++){for(var c=0;c<COLS;c++){
      var isPath=pathSet.has(c+','+r);
      var tower=towers.find(function(t){return t.r===r&&t.c===c;});
      var isEnd=c===4&&r===8;
      cells+='<div style="width:44px;height:44px;background:'+(isEnd?'rgba(255,0,170,.2)':isPath?'rgba(0,245,255,.06)':'rgba(0,0,20,.5)')+';border:1px solid '+(isPath?'rgba(0,245,255,.15)':'rgba(0,245,255,.08)')+';border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:'+(isPath||tower?'default':'pointer')+';position:relative" data-tr="'+r+'" data-tc="'+c+'">'+(tower?TOWER_TYPES[tower.type].emoji:isEnd?'🏰':isPath?'·':'')+'</div>';
    }}
    setHTML('<div class="g-score">💰 '+gold+' | ❤️ '+lives+' | Wave: '+wave+'</div>'+
      '<div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">'+
        TOWER_TYPES.map(function(t,i){return'<button class="g-btn" style="font-size:.7rem;padding:6px 10px;'+(ttype===i?'border-color:var(--neon3);color:var(--neon3)':'')+'" data-tt="'+i+'">'+t.emoji+' '+t.name+' ('+t.cost+'g)</button>';}).join('')+
      '</div>'+
      '<div style="display:grid;grid-template-columns:repeat('+COLS+',44px);gap:3px;margin:0 auto;width:fit-content">'+cells+'</div>'+
      '<div class="g-row" style="margin-top:10px"><button class="g-btn grn" id="ftwave">SEND WAVE</button><button class="g-btn" id="ftnew">NEW GAME</button></div>'+
      '<div class="g-msg" id="ftmsg">'+(over?(lives<=0?'💀 BASE DESTROYED!':'🏆 VICTORY!'):placing?'Click a empty tile to place '+TOWER_TYPES[ttype].emoji:'Select a tower type and click to place')+'</div>');
    qsa('[data-tt]').forEach(function(b){b.addEventListener('click',function(){ttype=+b.dataset.tt;placing=true;render();});});
    qsa('[data-tr]').forEach(function(cell){cell.addEventListener('click',function(){
      var r=+cell.dataset.tr,c=+cell.dataset.tc;
      if(pathSet.has(c+','+r))return;
      if(towers.find(function(t){return t.r===r&&t.c===c;}))return;
      var tt=TOWER_TYPES[ttype];
      if(gold<tt.cost){var m=qs('#ftmsg');if(m)m.textContent='Not enough gold!';return;}
      gold-=tt.cost;towers.push({r:r,c:c,type:ttype,cooldown:0});placing=false;render();
    });});
    qs('#ftwave').addEventListener('click',function(){spawnWave();render();});
    qs('#ftnew').addEventListener('click',gFortress);
    // Game loop tick
    if(over)return;
  }
  var _ftIv=setInterval(function(){
    if(over||!document.querySelector('[data-tr]')){clearInterval(_ftIv);return;}
    enemies.forEach(function(e){
      if(e.pi>=PATH.length-1)return;
      e.progress+=e.spd;
      if(e.progress>=1){e.pi++;e.progress=0;}
      if(e.pi>=PATH.length-1){lives--;e.pi=PATH.length;}
    });
    enemies=enemies.filter(function(e){return e.pi<PATH.length-1&&e.hp>0;});
    towers.forEach(function(t){
      if(t.cooldown>0){t.cooldown--;return;}
      var tt=TOWER_TYPES[t.type];
      var target=enemies.find(function(e){
        var ep=PATH[Math.min(e.pi,PATH.length-1)];
        return Math.hypot(ep[0]-t.c,ep[1]-t.r)<tt.range;
      });
      if(target){target.hp-=tt.dmg;t.cooldown=tt.rate;if(target.hp<=0)gold+=3;}
    });
    if(lives<=0){over=true;clearInterval(_ftIv);}
    if(over)render();
  },200);
  cleanupFn=function(){clearInterval(_ftIv);};
  render();
}

// ─── RIDDLE VAULT ────────────────────────────────────────────────────────────
function gRiddle(){
  var riddles=[
    {q:"I have cities, but no houses live there. I have mountains, but no trees grow there. I have water, but no fish swim there. What am I?",a:"MAP",hint:"You use me for navigation"},
    {q:"The more you take, the more you leave behind. What am I?",a:"FOOTSTEPS",hint:"Look down when you walk"},
    {q:"I speak without a mouth and hear without ears. I have no body, but I come alive with wind. What am I?",a:"ECHO",hint:"Shout in a canyon and hear it"},
    {q:"I have hands but cannot clap. What am I?",a:"CLOCK",hint:"You check me to know the time"},
    {q:"What has keys but no locks, space but no room, and you can enter but cannot go inside?",a:"KEYBOARD",hint:"You're using one right now"},
    {q:"I can fly without wings and cry without eyes. Wherever I go, darkness follows me. What am I?",a:"CLOUD",hint:"Look up at the sky"},
    {q:"What comes once in a minute, twice in a moment, but never in a thousand years?",a:"M",hint:"Look at the letter, not the concept"},
    {q:"I am always hungry and must be fed. The finger I touch will soon turn red. What am I?",a:"FIRE",hint:"Don't touch me or you'll get burned"},
    {q:"What can you break, even if you never pick it up or touch it?",a:"PROMISE",hint:"You make them with words"},
    {q:"I have a head and a tail but no body. What am I?",a:"COIN",hint:"Check your pocket"},
    {q:"The more you remove from me, the bigger I become. What am I?",a:"HOLE",hint:"Dig into the ground"},
    {q:"What runs but never walks, has a mouth but never talks, has a head but never weeps?",a:"RIVER",hint:"It flows to the ocean"},
    {q:"I am not alive, but I grow. I don't have lungs, but I need air. What am I?",a:"FIRE",hint:"A flame"},
    {q:"What has one eye but cannot see?",a:"NEEDLE",hint:"Used in sewing"},
    {q:"I shrink each time I take a bath. What am I?",a:"SOAP",hint:"Found in the bathroom"},
  ];
  riddles.sort(function(){return Math.random()-.5;});
  var qi=0,score=0,hint=false,skips=2;
  function render(msg){
    msg=msg||'';
    if(qi>=riddles.length){setHTML('<div class="g-score">'+score+'/'+riddles.length+'</div><div class="g-msg">'+(score>=12?'🧠 RIDDLE MASTER!':score>=8?'⚡ VERY CLEVER!':score>=5?'👍 Getting there!':'🤔 Keep thinking!')+'</div><div class="g-center"><button class="g-btn" id="rdnew">PLAY AGAIN</button></div>');qs('#rdnew').addEventListener('click',function(){riddles.sort(function(){return Math.random()-.5;});qi=0;score=0;hint=false;skips=2;render();});return;}
    var r=riddles[qi];
    setHTML('<div class="g-score">Score: '+score+' | '+(qi+1)+'/'+riddles.length+' | Skips: '+skips+'</div>'+
      '<div style="background:rgba(0,245,255,.04);border:1px solid rgba(0,245,255,.1);border-radius:6px;padding:16px;margin:12px 0;font-size:.95rem;line-height:1.65;color:var(--text);min-height:70px">'+r.q+'</div>'+
      (hint?'<div style="text-align:center;font-size:.88rem;color:rgba(200,232,255,.5);margin-bottom:6px">💡 Hint: '+r.hint+'</div>':'')+
      '<div class="g-msg">'+msg+'</div>'+
      '<input class="g-input" id="rdin" type="text" placeholder="Your answer..." autocomplete="off" autocorrect="off" spellcheck="false">'+
      '<div class="g-row">'+
        '<button class="g-btn" id="rdcheck">SUBMIT</button>'+
        (skips>0?'<button class="g-btn" style="opacity:.6" id="rdskip">SKIP ('+skips+' left)</button>':'')+
        (!hint?'<button class="g-btn" style="opacity:.5" id="rdhint">HINT</button>':'')+
      '</div>');
    qs('#rdin').focus();
    function check(){var v=qs('#rdin').value.toUpperCase().trim().replace(/[^A-Z]/g,'');if(!v)return;if(v===r.a){score++;qi++;hint=false;render('✅ Correct!');}else{render('❌ Try again!');}}
    qs('#rdin').addEventListener('keydown',function(e){if(e.key==='Enter')check();});
    qs('#rdcheck').addEventListener('click',check);
    if(qs('#rdskip'))qs('#rdskip').addEventListener('click',function(){skips--;hint=false;qi++;render('Skipped! Answer was: '+r.a);});
    if(qs('#rdhint'))qs('#rdhint').addEventListener('click',function(){hint=true;render();});
  }
  render();
}


})();
</script>
